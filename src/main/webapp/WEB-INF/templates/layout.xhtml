<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>
        <ui:insert name="title">SkillSwap</ui:insert>
    </title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>

<h:body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand">
            <h:link value="SkillSwap" outcome="/index" styleClass="#{facesContext.viewRoot.viewId == '/index.xhtml' ? 'brand-link active' : 'brand-link'}"/>
        </div>
        <div class="nav-links">
            <h:link value="Catalogue" outcome="/catalog" styleClass="#{facesContext.viewRoot.viewId == '/catalog.xhtml' ? 'nav-link active' : 'nav-link'}"/>

            <ui:fragment rendered="#{authBean.loggedIn}">
                <h:link value="Mes Compétences" outcome="/manage-skills" styleClass="#{facesContext.viewRoot.viewId == '/manage-skills.xhtml' ? 'nav-link active' : 'nav-link'}"/>
                <h:link value="Mes Swaps" outcome="/my-swaps" styleClass="#{facesContext.viewRoot.viewId == '/my-swaps.xhtml' ? 'nav-link active' : 'nav-link'}"/>
                <h:link value="Mon Profil" outcome="/profile" styleClass="#{facesContext.viewRoot.viewId == '/profile.xhtml' ? 'nav-link active' : 'nav-link'}"/>
                <span class="nav-credits">
                    ⏱ #{authBean.loggedInUser.soldeHeures}h
                </span>
                <h:form styleClass="nav-form">
                    <h:commandLink value="Déconnexion" action="#{authBean.logout}" styleClass="nav-link logout"/>
                </h:form>
            </ui:fragment>

            <ui:fragment rendered="#{!authBean.loggedIn}">
                <h:link value="Connexion" outcome="/login" styleClass="#{facesContext.viewRoot.viewId == '/login.xhtml' ? 'nav-link active' : 'nav-link'}"/>
                <h:link value="Inscription" outcome="/register" styleClass="#{facesContext.viewRoot.viewId == '/register.xhtml' ? 'nav-link active' : 'nav-link btn-nav'}"/>
            </ui:fragment>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <ui:insert name="content">
            <!-- Page content goes here -->
        </ui:insert>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2024 SkillSwap - "Le savoir ne vaut que s'il est partagé par tous"</p>
        <p>ENSA Tanger - Développement Web Java (JSF / Hibernate)</p>
    </footer>

    <!-- Toast notification system -->
    <div id="skillswap-toast-container" style="position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>

    <style>
        .ss-toast{display:flex;align-items:flex-start;gap:12px;background:white;border:0.5px solid #e0e0e0;border-left:3px solid;border-radius:12px;padding:14px 18px;min-width:280px;max-width:360px;pointer-events:all;transform:translateX(120%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-sizing:border-box;}
        .ss-toast.show{transform:translateX(0);}
        .ss-toast.success{border-left-color:#1D9E75;}
        .ss-toast.error{border-left-color:#E24B4A;}
        .ss-toast-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:1px;}
        .ss-toast.success .ss-toast-icon{background:#E1F5EE;color:#0F6E56;}
        .ss-toast.error .ss-toast-icon{background:#FCEBEB;color:#A32D2D;}
        .ss-toast-title{font-size:14px;font-weight:600;margin:0 0 2px;color:#333;}
        .ss-toast-msg{font-size:13px;color:#666;margin:0;line-height:1.5;}
        .ss-toast-close{background:none;border:none;cursor:pointer;color:#999;font-size:18px;line-height:1;padding:0;flex-shrink:0;}
    </style>

    <script>
        //<![CDATA[
        var _ssToastId = 0;
        function ssToast(type, title, msg, duration) {
            var tc = document.getElementById('skillswap-toast-container');
            var id = 'sst' + (++_ssToastId);
            var icon = type === 'success' ? '✓' : '✕';
            var el = document.createElement('div');
            el.className = 'ss-toast ' + type;
            el.id = id;
            el.innerHTML = '<div class="ss-toast-icon">' + icon + '</div>'
                + '<div style="flex:1"><p class="ss-toast-title">' + title + '</p>'
                + '<p class="ss-toast-msg">' + msg + '</p></div>'
                + '<button class="ss-toast-close" onclick="ssDismiss(this.parentNode.id)">x</button>';
            tc.appendChild(el);
            requestAnimationFrame(function() { el.classList.add('show'); });
            setTimeout(function() { ssDismiss(id); }, duration || 4000);
        }
        function ssDismiss(id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('show');
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 400);
        }
        //]]>
    </script>
</h:body>
</html>
